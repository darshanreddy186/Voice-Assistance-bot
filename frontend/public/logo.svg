<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Network nodes pattern -->
  <circle cx="100" cy="50" r="8" fill="#5b6fd8"/>
  <circle cx="70" cy="80" r="6" fill="#5b6fd8"/>
  <circle cx="130" cy="80" r="6" fill="#5b6fd8"/>
  <circle cx="50" cy="110" r="7" fill="#5b6fd8"/>
  <circle cx="90" cy="110" r="5" fill="#5b6fd8"/>
  <circle cx="110" cy="110" r="5" fill="#5b6fd8"/>
  <circle cx="150" cy="110" r="7" fill="#5b6fd8"/>
  <circle cx="70" cy="140" r="6" fill="#5b6fd8"/>
  <circle cx="130" cy="140" r="6" fill="#5b6fd8"/>
  <circle cx="100" cy="170" r="8" fill="#5b6fd8"/>
  
  <!-- Connecting lines -->
  <line x1="100" y1="50" x2="70" y2="80" stroke="#5b6fd8" stroke-width="3"/>
  <line x1="100" y1="50" x2="130" y2="80" stroke="#5b6fd8" stroke-width="3"/>
  <line x1="70" y1="80" x2="50" y2="110" stroke="#5b6fd8" stroke-width="3"/>
  <line x1="70" y1="80" x2="90" y2="110" stroke="#5b6fd8" stroke-width="3"/>
  <line x1="130" y1="80" x2="110" y2="110" stroke="#5b6fd8" stroke-width="3"/>
  <line x1="130" y1="80" x2="150" y2="110" stroke="#5b6fd8" stroke-width="3"/>
  <line x1="50" y1="110" x2="70" y2="140" stroke="#5b6fd8" stroke-width="3"/>
  <line x1="150" y1="110" x2="130" y2="140" stroke="#5b6fd8" stroke-width="3"/>
  <line x1="70" y1="140" x2="100" y2="170" stroke="#5b6fd8" stroke-width="3"/>
  <line x1="130" y1="140" x2="100" y2="170" stroke="#5b6fd8" stroke-width="3"/>
</svg>
